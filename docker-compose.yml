version: "3.9"

services:
  # ── Database ────────────────────────────────────
  # PostgreSQL with healthcheck so the API never starts before the DB is ready.
  db:
    image: postgres:15-alpine
    container_name: task-manager-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── API ─────────────────────────────────────────
  # Alembic migrations run automatically at startup before the app serves requests.
  api:
    build:
      context: ./task-manager-api
      dockerfile: Dockerfile
    container_name: task-manager-api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────
  # VITE_API_URL is a build arg (not an env var) because Vite bakes
  # environment variables into the bundle at build time, not runtime.
  frontend:
    build:
      context: ./task-manager-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: task-manager-frontend
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
