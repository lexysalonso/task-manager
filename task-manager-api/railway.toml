[build]
  builder = "DOCKERFILE"
  dockerfile_path = "Dockerfile"

[deploy]
  start_command = "uvicorn src.main:app --host 0.0.0.0 --port $PORT"
  healthcheck_path = "/api/v1/health"
  restarter = "always"

[service]
  ## Uncomment if you want to use Railway's Postgres plugin
  # [[service.plugins]]
  #   name = "postgresql"
